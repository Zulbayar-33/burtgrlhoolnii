  const input = document.getElementById("searchInput").value.toLowerCase();
  const select = document.getElementById("employee");
  const options = select.getElementsByTagName("option");

  for (let i = 0; i < options.length; i++) {
    const text = options[i].text.toLowerCase();

    if (text.includes(input)) {
      options[i].style.display = "";
    } else {
      options[i].style.display = "none";
    }
  }
}

// SAVE
async function saveStatus(status) {
  const employee = document.getElementById("employee");
  const selected = employee.options[employee.selectedIndex];

  const row = employee.value;
  const date = document.getElementById("date").value;
  const msg = document.getElementById("msg");

  if (!row) {
    msg.innerHTML = "<span class='text-danger'>Ажилтан сонгоно уу</span>";
    return;
  }

  if (!date) {
    msg.innerHTML = "<span class='text-danger'>Огноо сонгоно уу</span>";
    return;
  }

  msg.innerHTML = "Хадгалж байна...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        row: row,
        date: date,
        status: status,
        no: selected.dataset.no,
        ovog: selected.dataset.ovog,
        ner: selected.dataset.ner,
        job: selected.dataset.job
      })
    });

    const data = await res.json();

    if (data.success) {
      msg.innerHTML = "<span class='text-success'>" + data.message + "</span>";
    } else {
      msg.innerHTML = "<span class='text-danger'>" + data.message + "</span>";
    }

  } catch (err) {
    console.log(err);
    msg.innerHTML = "<span class='text-danger'>Apps Script холболт алдаа</span>";
  }
}
</script>
